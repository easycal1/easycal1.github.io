<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free BMI Calculator - Check Your Body Mass Index Instantly</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow-x: hidden;
  }
  body {
    background: linear-gradient(-45deg, #667eea, #764ba2, #6a3093, #4568dc);
    background-size: 400% 400%;
    animation: gradientMove 14s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    position: relative;
  }
  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(50px);
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }
  .blob1 {
    width: 260px; height: 260px;
    background: #ff6fd8;
    top: -60px; left: -60px;
    animation: floatBlob1 12s ease-in-out infinite;
  }
  .blob2 {
    width: 220px; height: 220px;
    background: #3be8ff;
    bottom: -40px; right: -40px;
    animation: floatBlob2 15s ease-in-out infinite;
  }
  .blob3 {
    width: 180px; height: 180px;
    background: #ffd76f;
    top: 40%; right: -60px;
    animation: floatBlob3 10s ease-in-out infinite;
  }
  @keyframes floatBlob1 {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(40px, 60px) scale(1.15); }
  }
  @keyframes floatBlob2 {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-30px, -40px) scale(1.1); }
  }
  @keyframes floatBlob3 {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-25px, 30px) scale(1.2); }
  }

  .content-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    max-width: 420px;
    width: 100%;
    padding: 30px 25px;
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    animation: floatIn 0.6s ease;
    border: 1px solid rgba(255,255,255,0.4);
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    font-size: 24px;
    text-align: center;
    color: #2c3e50;
    margin-bottom: 5px;
  }
  .subtitle {
    text-align: center;
    color: #666;
    font-size: 13px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: 600;
    color: #34495e;
    font-size: 14px;
  }
  input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    background: white;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  input:focus {
    outline: none;
    border-color: #764ba2;
    box-shadow: 0 0 0 3px rgba(118,75,162,0.15);
  }
  button.calc-btn {
    width: 100%;
    margin-top: 22px;
    padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  button.calc-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(118,75,162,0.4);
  }
  button.calc-btn:active { transform: translateY(0); }

  #resultBox {
    margin-top: 25px;
    display: none;
    animation: fadeUp 0.5s ease;
  }
