<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free BMI Calculator - Check Your Body Mass Index Instantly</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
    margin: 0;
  }
  .card {
    background: white;
    max-width: 420px;
    width: 100%;
    padding: 30px 25px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: floatIn 0.6s ease;
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    font-size: 24px;
    text-align: center;
    color: #2c3e50;
    margin-bottom: 5px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: 600;
    color: #34495e;
    font-size: 14px;
  }
  input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  input:focus {
    outline: none;
    border-color: #764ba2;
    box-shadow: 0 0 0 3px rgba(118,75,162,0.15);
  }
  button {
    width: 100%;
    margin-top: 22px;
    padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(118,75,162,0.35);
  }
  button:active { transform: translateY(0); }

  #resultBox {
    margin-top: 25px;
    display: none;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bmi-number {
    text-align: center;
    font-size: 42px;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 2px;
  }
  .bmi-category {
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 15px;
  }
  .bar-track {
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(90deg, #3498db 0%, #2ecc71 35%, #f1c40f 65%, #e74c3c 100%);
    position: relative;
    margin-top: 10px;
  }
  .bar-pointer {
    position: absolute;
    top: -6px;
    width: 4px;
    height: 24px;
    background: #2c3e50;
    border-radius: 2px;
    transition: left 0.6s ease;
  }
  .ideal-weight {
    margin-top: 18px;
    background: #f5f7fa;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    font-size: 14px;
    color: #34495e;
  }
  .ideal-weight strong {
    color: #764ba2;
    font-size: 16px;
  }

  /* Exercise section */
  #exerciseBox {
    margin-top: 25px;
    display: none;
  }
  .exercise-title {
    font-size: 16px;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 12px;
    text-align: center;
  }
  .exercise-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .ex-card {
    background: #f5f7fa;
    border-radius: 14px;
    padding: 16px 8px;
    text-align: center;
    transition: transform 0.2s;
  }
  .ex-card:hover { transform: translateY(-4px); }
  .ex-icon {
    font-size: 34px;
    display: inline-block;
  }
  .ex-name {
    font-size: 12px;
    font-weight: 600;
    color: #34495e;
    margin-top: 6px;
  }

  /* Animations for each icon */
  @keyframes jump {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.1); }
  }
  .anim-jump { animation: jump 0.8s ease-in-out infinite; }

  @keyframes squat {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.8) translateY(4px); }
  }
  .anim-squat { animation: squat 1s ease-in-out infinite; }

  @keyframes run {
    0% { transform: translateX(0) rotate(0deg); }
    25% { transform: translateX(4px) rotate(-8deg); }
    50% { transform: translateX(0) rotate(0deg); }
    75% { transform: translateX(-4px) rotate(8deg); }
    100% { transform: translateX(0) rotate(0deg); }
  }
  .anim-run { animation: run 0.6s ease-in-out infinite; }

  @keyframes stretch {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(15deg); }
  }
  .anim-stretch { animation: stretch 1.4s ease-in-out infinite; }

  @keyframes lift {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px) scale(1.05); }
  }
  .anim-lift { animation: lift 1s ease-in-out infinite; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .anim-spin { animation: spin 2s linear infinite; }
</style>
</head>
<body>

<div class="card">
  <h1>BMI Calculator</h1>
  <p class="subtitle">Check your Body Mass Index instantly</p>

  <label for="height">Height (cm)</label>
  <input type="number" id="height" placeholder="e.g. 170">

  <label for="weight">Weight (kg)</label>
  <input type="number" id="weight" placeholder="e.g. 65">

  <button onclick="calculateBMI()">Calculate BMI</button>

  <div id="resultBox">
    <div class="bmi-number" id="bmiNumber"></div>
    <div class="bmi-category" id="bmiCategory"></div>
    <div class="bar-track">
      <div class="bar-pointer" id="barPointer"></div>
    </div>
    <div class="ideal-weight" id="idealWeight"></div>
  </div>

  <div id="exerciseBox">
    <div class="exercise-title" id="exerciseTitle"></div>
    <div class="exercise-grid" id="exerciseGrid"></div>
  </div>
</div>

<script>
function calculateBMI() {
  const heightCm = parseFloat(document.getElementById("height").value);
  const weight = parseFloat(document.getElementById("weight").value);
  const resultBox = document.getElementById("resultBox");
  const exerciseBox = document.getElementById("exerciseBox");

  if (!heightCm || !weight || heightCm <= 0 || weight <= 0) {
    alert("Please enter valid height and weight.");
    return;
  }

  const heightM = heightCm / 100;
  const bmi = weight / (heightM * heightM);
  let category = "";
  let color = "";

  if (bmi < 18.5) { category = "Underweight"; color = "#3498db"; }
  else if (bmi < 25) { category = "Normal weight"; color = "#2ecc71"; }
  else if (bmi < 30) { category = "Overweight"; color = "#f1c40f"; }
  else { category = "Obese"; color = "#e74c3c"; }

  document.getElementById("bmiNumber").innerText = bmi.toFixed(1);
  document.getElementById("bmiCategory").innerText = category;
  document.getElementById("bmiCategory").style.color = color;

  let percent = ((bmi - 10) / (40 - 10)) * 100;
  percent = Math.max(0, Math.min(100, percent));
  document.getElementById("barPointer").style.left = percent + "%";

  const minWeight = (18.5 * heightM * heightM).toFixed(1);
  const maxWeight = (24.9 * heightM * heightM).toFixed(1);
  document.getElementById("idealWeight").innerHTML =
    "Ideal weight range for your height: <strong>" + minWeight + " - " + maxWeight + " kg</strong>";

  resultBox.style.display = "block";
  showExercises(category);
  exerciseBox.style.display = "block";
}

function showExercises(category) {
  const title = document.getElementById("exerciseTitle");
  const grid = document.getElementById("exerciseGrid");
  let heading = "";
  let exercises = [];

  if (category === "Underweight") {
    heading = "Muscle-building exercises for you";
    exercises = [
      { icon: "🏋️", name: "Weight Lifting", anim: "anim-lift" },
      { icon: "🍳", name: "Protein-rich Meals", anim: "anim-stretch" },
      { icon: "🧎", name: "Push-ups", anim: "anim-squat" },
      { icon: "🧘", name: "Yoga & Stretching", anim: "anim-stretch" }
    ];
  } else if (category === "Normal weight") {
    heading = "Great! Keep maintaining with these";
    exercises = [
      { icon: "🏃", name: "Light Jogging", anim: "anim-run" },
      { icon: "🚴", name: "Cycling", anim: "anim-spin" },
      { icon: "🧘", name: "Yoga", anim: "anim-stretch" },
      { icon: "🤸", name: "Jumping Jacks", anim: "anim-jump" }
    ];
  } else if (category === "Overweight") {
    heading = "Cardio & strength to help you trim down";
    exercises = [
      { icon: "🏃", name: "Brisk Walking/Jog", anim: "anim-run" },
      { icon: "🤸", name: "Jumping Jacks", anim: "anim-jump" },
      { icon: "🧎", name: "Squats", anim: "anim-squat" },
      { icon: "🚴", name: "Cycling", anim: "anim-spin" }
    ];
  } else {
    heading = "Start gentle, build consistency";
    exercises = [
      { icon: "🚶", name: "Daily Walking", anim: "anim-run" },
      { icon: "🏊", name: "Swimming", anim: "anim-stretch" },
      { icon: "🧘", name: "Gentle Yoga", anim: "anim-stretch" },
      { icon: "🧎", name: "Bodyweight Squats", anim: "anim-squat" }
    ];
  }

  title.innerText = heading;
  grid.innerHTML = "";
  exercises.forEach(ex => {
    grid.innerHTML += `
      <div class="ex-card">
        <span class="ex-icon ${ex.anim}">${ex.icon}</span>
        <div class="ex-name">${ex.name}</div>
      </div>
    `;
  });
}
</script>

</body>
</html>
